<svg xmlns="http://www.w3.org/2000/svg" viewBox="-36 -36 72 72">
  <!-- Three cube faces meeting at the hex center, matching the in-game
       cube geometry exactly. Hex radius = 32, vertices at angles
       -30, 30, 90, 150, 210, 270 (pointy-top). -->
  <!-- right face (bottom rhombus, dark brown) -->
  <polygon points="0,0 27.713,16 0,32 -27.713,16" fill="#a04a18" />
  <!-- left face (upper-left rhombus, orange) -->
  <polygon points="0,0 -27.713,16 -27.713,-16 0,-32" fill="#f9a23f" />
  <!-- top face (upper-right rhombus, light yellow) -->
  <polygon points="0,0 0,-32 27.713,-16 27.713,16" fill="#ffeaa3" />
</svg>
